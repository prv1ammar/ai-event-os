variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"

  REGISTRY: registry.tybotflow.com:443

  BACKEND_IMAGE: $REGISTRY/root/ai-events/backend
  FRONTEND_IMAGE: $REGISTRY/root/ai-events/frontend

  IMAGE_TAG: $CI_COMMIT_SHORT_SHA


stages:
  - build
  - publish
  - deploy


.docker_login: &docker_login
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin



# ============================================================
# BUILD BACKEND
# ============================================================

build:backend:
  stage: build

  tags:
    - dev-runner.81

  <<: *docker_login

  script:

    - |
      docker build \
        --cache-from "$BACKEND_IMAGE:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -f backend/Dockerfile \
        -t "$BACKEND_IMAGE:$IMAGE_TAG" \
        -t "$BACKEND_IMAGE:$CI_COMMIT_REF_SLUG" \
        backend

    - docker push "$BACKEND_IMAGE:$IMAGE_TAG"
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_REF_SLUG"


  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'


# ============================================================
# BUILD FRONTEND
# ============================================================

build:frontend:

  stage: build

  tags:
    - dev-runner.81

  <<: *docker_login


  script:

    - |
      docker build \
        --cache-from "$FRONTEND_IMAGE:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg VITE_API_URL=https://events-api.tybot.ma \
        -t "$FRONTEND_IMAGE:$IMAGE_TAG" \
        -t "$FRONTEND_IMAGE:$CI_COMMIT_REF_SLUG" \
        frontend


    - docker push "$FRONTEND_IMAGE:$IMAGE_TAG"
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_REF_SLUG"


  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'





# ============================================================
# PUBLISH BACKEND latest
# ============================================================

publish:backend:

  stage: publish

  tags:
    - dev-runner.81

  <<: *docker_login


  needs:
    - job: build:backend


  script:
  - docker pull "$BACKEND_IMAGE:$IMAGE_TAG"

  - docker tag "$BACKEND_IMAGE:$IMAGE_TAG" "$BACKEND_IMAGE:latest"

  - docker push "$BACKEND_IMAGE:latest"


  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'




# ============================================================
# PUBLISH FRONTEND latest
# ============================================================

publish:frontend:

  stage: publish

  tags:
    - dev-runner.81

  <<: *docker_login

  needs:
    - job: build:frontend

  script:

    - docker pull "$FRONTEND_IMAGE:$IMAGE_TAG"

    - docker tag "$FRONTEND_IMAGE:$IMAGE_TAG" "$FRONTEND_IMAGE:latest"

    - docker push "$FRONTEND_IMAGE:latest"


  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy:

  stage: deploy

  tags:
    - dev-runner.81

  needs:
    - job: publish:backend
    - job: publish:frontend


  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'


  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin


  script:

    - cd /home/tython/ai-event

    - docker compose pull

    - docker compose up -d --remove-orphans

    - docker image prune -f