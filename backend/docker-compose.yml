version: "3.9"

# ── Shared environment source ──────────────────────────────────────────────────
x-api-env: &api-env
  env_file:
    - .env

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  aievents_net:
    driver: bridge

services:

  # ──────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 15
  # ──────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: aievents_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aievent
      POSTGRES_PASSWORD: aievent_pass
      POSTGRES_DB: aievent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    networks:
      - aievents_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aievent -d aievent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aievents_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aievents_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────────
  # FastAPI — main API service
  # ──────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aievents_api
    restart: unless-stopped
    <<: *api-env
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
        --log-level info
    ports:
      - "8000:8000"
    volumes:
      - .:/app                    # hot reload — mount whole project
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aievents_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aievents_celery
    restart: unless-stopped
    <<: *api-env
    command: >
      celery -A app.tasks.celery_app.celery_app worker
        --loglevel=info
        --concurrency=4
        -Q celery,email,reports,analytics
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aievents_net

  # ──────────────────────────────────────────────────────────────────────────────
  # Celery Beat — periodic task scheduler
  # ──────────────────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aievents_celery_beat
    restart: unless-stopped
    <<: *api-env
    command: >
      celery -A app.tasks.celery_app.celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - aievents_net

  # ──────────────────────────────────────────────────────────────────────────────
  # Flower — Celery monitoring dashboard (dev only)
  # ──────────────────────────────────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aievents_flower
    restart: unless-stopped
    <<: *api-env
    command: >
      celery -A app.tasks.celery_app.celery_app flower
        --port=5555
        --broker=${CELERY_BROKER_URL}
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery
    networks:
      - aievents_net

  # ──────────────────────────────────────────────────────────────────────────────
  # pgAdmin 4 — PostgreSQL GUI (dev only)
  # ──────────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aievents_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aievents.ma}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_secret}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - aievents_net
