[pytest]
asyncio_mode = auto
# Keep the engine alive for the full test session — required for pytest-asyncio >= 1.0
# When omitted, session-scoped async fixtures share the function-scoped event loop
# which causes them to be torn down mid-session ("no such table" errors).
asyncio_default_fixture_loop_scope = session
testpaths = tests
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
